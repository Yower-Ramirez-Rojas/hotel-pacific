<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración - Hotel Pacífico</title>
    <link rel="stylesheet" href="style.css?v=3">
    <style>
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #333; color: white; }
        tr:hover { background-color: #f5f5f5; }
        .btn-liberar { background-color: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .btn-liberar:hover { background-color: #c0392b; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <img src="/img/logo.png" alt="Logo Hotel Pacific" class="logo-symbol">
            <h1 class="hotel-title">Panel Admin - Control de Reservas</h1>
        </div>
    </header>

    <main style="padding: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Registro de Reservas Activas</h2>
            <button onclick="cargarReservas()" style="padding: 10px; cursor: pointer;">Actualizar Lista</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Habitación</th>
                    <th>RUT Cliente</th>
                    <th>Nombre Completo</th>
                    <th>Teléfono</th>
                    <th>Fecha Ingreso</th>
                    <th>Método Pago</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tabla-cuerpo">
                <tr>
                    <td colspan="7" style="text-align: center;">Cargando registros...</td>
                </tr>
            </tbody>
        </table>
    </main>

    <script>
        
        function cargarReservas() {
            fetch('/api/reservas')
                .then(res => res.json())
                .then(data => {
                    const cuerpo = document.getElementById('tabla-cuerpo');
                    
                    if (data.length === 0) {
                        cuerpo.innerHTML = `<tr><td colspan="7" style="text-align: center;">No hay reservas registradas en este momento.</td></tr>`;
                        return;
                    }

                    
                    cuerpo.innerHTML = data.map(reserva => `
                        <tr>
                            <td><strong>Habitación ${reserva.numero}</strong></td>
                            <td>${reserva.rut}</td>
                            <td>${reserva.nombre} ${reserva.apellido}</td>
                            <td>${reserva.telefono}</td>
                            <td>${reserva.fecha_ingreso.split('T')[0]}</td>
                            <td><span style="text-transform: uppercase; font-weight: bold;">${reserva.pago}</span></td>
                            <td>
                                <button class="btn-liberar" onclick="liberarHabitacion('${reserva.numero}', '${reserva.id}')">
                                    Liberar
                                </button>
                            </td>
                        </tr>
                    `).join('');
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('tabla-cuerpo').innerHTML = `<tr><td colspan="7" style="text-align: center; color: red;">Error al conectar con el servidor.</td></tr>`;
                });
        }

        
        function liberarHabitacion(numeroHabitacion, idReserva) {
            if (confirm(`¿Estás seguro que deseas eliminar la reserva y liberar la Habitación ${numeroHabitacion}?`)) {
                
                fetch('/api/liberar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        numero: numeroHabitacion,
                        id: idReserva 
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        alert(" " + data.mensaje);
                        cargarReservas(); 
                    } else {
                        alert(" Error: " + data.error);
                    }
                });
            }
        }

        cargarReservas();
    </script>
</body>
</html>
